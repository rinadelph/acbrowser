name: Upstream Sync Check

on:
  schedule:
    # Check for upstream updates daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      auto_merge:
        description: 'Auto-merge if no conflicts'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-agent-browser:
    name: Check agent-browser upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout acbrowser
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/vercel-labs/agent-browser.git || true
          git fetch upstream
      
      - name: Check for updates
        id: check
        run: |
          UPSTREAM_HASH=$(git rev-parse upstream/main)
          LOCAL_HASH=$(git rev-parse main)
          BEHIND=$(git rev-list --count main..upstream/main)
          
          echo "upstream_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          echo "local_hash=$LOCAL_HASH" >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "🔄 acbrowser is $BEHIND commits behind upstream agent-browser"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ acbrowser is up to date with upstream agent-browser"
          fi
      
      - name: Create sync issue if updates available
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = '${{ steps.check.outputs.behind }}';
            const upstreamHash = '${{ steps.check.outputs.upstream_hash }}';
            
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔄 Sync from upstream agent-browser (${behind} commits behind)`,
                body: `## Upstream Updates Available
                
            The acbrowser repository is **${behind} commits** behind the upstream agent-browser repository.
            
            ### Details
            - Upstream commit: \`${upstreamHash}\`
            - Check the changes: [agent-browser@main](https://github.com/vercel-labs/agent-browser/compare/${upstreamHash}~${behind}...${upstreamHash})
            
            ### Sync Instructions
            \`\`\`bash
            git fetch upstream
            git log HEAD..upstream/main --oneline  # Review changes
            git merge upstream/main
            # Resolve any conflicts and test
            cargo check --manifest-path cli/Cargo.toml
            git push origin main
            \`\`\`
            
            ### What to watch for
            - CLI changes in \`cli/src/\`
            - Chrome launch changes in \`cli/src/native/cdp/chrome.rs\`
            - Flag changes in \`cli/src/flags.rs\`
            - Dependencies in \`cli/Cargo.toml\` and \`package.json\`
            
            ---
            *This issue was automatically created by the Upstream Sync workflow.*
            `,
                labels: ['upstream-sync', 'automated']
              });
            }

  check-cloak-browser:
    name: Check CloakBrowser upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout acbrowser
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add cloak-upstream remote
        run: |
          git remote add cloak-upstream https://github.com/CloakHQ/CloakBrowser.git || true
          git fetch cloak-upstream
      
      - name: Check for updates
        id: check
        run: |
          UPSTREAM_HASH=$(git rev-parse cloak-upstream/main)
          echo "upstream_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          
          # Get the latest commit message to check for version info
          LATEST_MSG=$(git log --format=%s -1 cloak-upstream/main)
          echo "latest_msg=$LATEST_MSG" >> $GITHUB_OUTPUT
          
          echo "✅ Checked CloakBrowser upstream"
          echo "Latest commit: $LATEST_MSG"
      
      - name: Create CloakBrowser update issue
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamHash = '${{ steps.check.outputs.upstream_hash }}';
            const latestMsg = '${{ steps.check.outputs.latest_msg }}';
            
            // Check if issue for this hash already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cloak-update'
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.body && issue.body.includes(upstreamHash)
            );
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🛡️ CloakBrowser stealth binary update check`,
                body: `## CloakBrowser Upstream Check
                
            This is an automated check for CloakBrowser stealth binary updates.
            
            ### Latest Upstream
            - Commit: \`${upstreamHash}\`
            - Message: ${latestMsg}
            - View changes: [CloakBrowser@main](https://github.com/CloakHQ/CloakBrowser/commit/${upstreamHash})
            
            ### Stealth Binary Integration
            The CloakBrowser stealth binary is used when \`--stealth\` flag is enabled.
            The binary is detected from:
            - \`CLOAKBROWSER_BINARY_PATH\` env var (user override)
            - \`~/.cloakbrowser/chromium-*/\` (pip install location)
            
            ### Manual Integration
            If there are important stealth patches, users should:
            \`\`\`bash
            pip install --upgrade cloakbrowser
            \`\`\`
            
            ---
            *This issue was automatically created by the Upstream Sync workflow.*
            `,
                labels: ['cloak-update', 'automated']
              });
            }
